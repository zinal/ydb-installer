openapi: 3.0.3
info:
  title: YDB Installer API
  version: 0.1.0
  description: |
    Public REST API for installation session lifecycle (FR-API-001–003).
    Machine-readable contract placeholder; expand to match handlers in api/.
servers:
  - url: https://{host}/api/v1
    variables:
      host:
        default: localhost:8443
paths:
  /metadata/topologies:
    get:
      summary: Supported base storage topologies
      operationId: listTopologies
      responses:
        '200':
          description: OK
  /metadata/artifact-modes:
    get:
      summary: Supported artifact source modes
      operationId: listArtifactModes
      responses:
        '200':
          description: OK
  /metadata/reference:
    get:
      summary: Reference index for UI
      operationId: getReferenceIndex
      responses:
        '200':
          description: OK
  /sessions:
    get:
      summary: List installation sessions
      operationId: listSessions
      parameters:
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer }
      responses:
        '200':
          description: OK
    post:
      summary: Create session
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mode: { type: string, enum: [interactive, batch] }
                title: { type: string }
      responses:
        '201':
          description: Created
  /sessions/{sessionID}:
    parameters:
      - $ref: '#/components/parameters/sessionID'
    get:
      summary: Get session
      operationId: getSession
      responses:
        '200':
          description: OK
    patch:
      summary: Update draft metadata
      operationId: patchSession
      responses:
        '204':
          description: No Content
    delete:
      summary: Delete session
      operationId: deleteSession
      responses:
        '204':
          description: No Content
  /sessions/{sessionID}/targets:
    post:
      summary: Set discovery targets
      operationId: setTargets
      responses:
        '204':
          description: No Content
  /sessions/{sessionID}/discovery/run:
    post:
      summary: Run discovery
      operationId: runDiscovery
      responses:
        '202':
          description: Accepted
  /sessions/{sessionID}/discovery:
    get:
      summary: Get discovery snapshot
      operationId: getDiscovery
      responses:
        '200':
          description: OK
  /sessions/{sessionID}/discovery/refresh:
    post:
      summary: Refresh discovery
      operationId: refreshDiscovery
      responses:
        '202':
          description: Accepted
  /sessions/{sessionID}/configuration:
    get:
      summary: Get cluster configuration
      operationId: getConfiguration
      responses:
        '200':
          description: OK
    put:
      summary: Put cluster configuration
      operationId: putConfiguration
      responses:
        '204':
          description: No Content
  /sessions/{sessionID}/validation/run:
    post:
      summary: Run preflight validation
      operationId: runValidation
      responses:
        '200':
          description: OK
  /sessions/{sessionID}/execution/start:
    post:
      summary: Start execution
      operationId: startExecution
      responses:
        '202':
          description: Accepted
  /sessions/{sessionID}/execution/cancel:
    post:
      summary: Request cancellation
      operationId: cancelExecution
      responses:
        '202':
          description: Accepted
  /sessions/{sessionID}/execution/progress:
    get:
      summary: Execution progress
      operationId: getProgress
      responses:
        '200':
          description: OK
components:
  parameters:
    sessionID:
      name: sessionID
      in: path
      required: true
      schema:
        type: string
        format: uuid
